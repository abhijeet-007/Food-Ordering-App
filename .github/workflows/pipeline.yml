name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  PROJECT: food-app

permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate (staging)
        working-directory: terraform/envs/staging
        run: |
          terraform init -backend=false
          terraform validate

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        working-directory: terraform/
        run: |
          tflint --init
          tflint --recursive

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build & validate
        run: docker build --target test -t ${{ env.PROJECT }}:test .

  # ── 3. Provision Staging Infrastructure (creates ECR + all AWS resources) ──
  infra-staging:
    name: Infra → Staging
    runs-on: ubuntu-latest
    needs: test
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init & apply staging
        working-directory: terraform/envs/staging
        run: |
          terraform init "-backend-config=backend.hcl"
          terraform apply -auto-approve \
            -var="image_tag=latest" \
            -var="desired_count=0"

  # ── 4. Build & Push to ECR ─────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: infra-staging
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.PROJECT }}-staging:$IMAGE_TAG \
                       -t $ECR_REGISTRY/${{ env.PROJECT }}-staging:latest .
          docker push $ECR_REGISTRY/${{ env.PROJECT }}-staging:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT }}-staging:latest

  # ── 5. Deploy to Staging (update ECS with new image) ──────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform apply with new image tag
        working-directory: terraform/envs/staging
        run: |
          terraform init "-backend-config=backend.hcl"
          terraform apply -auto-approve \
            -var="image_tag=${{ needs.build.outputs.image_tag }}"

      - name: Health check staging
        run: bash scripts/health-check.sh staging ${{ env.AWS_REGION }} ${{ env.PROJECT }}

  # ── 6. Manual Approval ─────────────────────────────────────────────────────
  approve-prod:
    name: Approve Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production-approval
    steps:
      - name: Awaiting approval
        run: echo "Approved for production deployment"

  # ── 7. Provision Prod Infrastructure ──────────────────────────────────────
  infra-prod:
    name: Infra → Production
    runs-on: ubuntu-latest
    needs: approve-prod
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init & apply prod
        working-directory: terraform/envs/prod
        run: |
          terraform init "-backend-config=backend.hcl"
          terraform apply -auto-approve \
            -var="image_tag=latest" \
            -var="desired_count=0"

  # ── 8. Deploy to Production ────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, infra-prod]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag image for prod ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          docker pull $ECR_REGISTRY/${{ env.PROJECT }}-staging:$IMAGE_TAG
          docker tag  $ECR_REGISTRY/${{ env.PROJECT }}-staging:$IMAGE_TAG \
                      $ECR_REGISTRY/${{ env.PROJECT }}-prod:$IMAGE_TAG
          docker tag  $ECR_REGISTRY/${{ env.PROJECT }}-staging:$IMAGE_TAG \
                      $ECR_REGISTRY/${{ env.PROJECT }}-prod:latest
          docker push $ECR_REGISTRY/${{ env.PROJECT }}-prod:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.PROJECT }}-prod:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Capture previous task definition (for rollback)
        id: prev-task
        run: |
          PREV=$(aws ecs describe-services \
            --cluster ${{ env.PROJECT }}-prod-cluster \
            --services ${{ env.PROJECT }}-prod-service \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task_def=$PREV" >> "$GITHUB_OUTPUT"

      - name: Terraform deploy prod
        working-directory: terraform/envs/prod
        run: |
          terraform init "-backend-config=backend.hcl"
          terraform apply -auto-approve \
            -var="image_tag=${{ needs.build.outputs.image_tag }}"

      - name: Health check production
        id: health
        run: bash scripts/health-check.sh prod ${{ env.AWS_REGION }} ${{ env.PROJECT }}

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          bash scripts/rollback.sh \
            ${{ env.PROJECT }}-prod-cluster \
            ${{ env.PROJECT }}-prod-service \
            "${{ steps.prev-task.outputs.task_def }}" \
            ${{ env.AWS_REGION }}
